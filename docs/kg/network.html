<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系网络 · 古天文知识图谱</title>
<style>
:root {
  --bg: #06080f;
  --surface: #0d1117;
  --text: #c8c0a8;
  --gold: #c4a35a;
  --gold-bright: #e0c878;
  --jade: #4a9b8e;
  --steel: #6b8db5;
  --coral: #c46b5a;
  --purple: #8b6baf;
  --star-glow: #e8dcc8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 50%, #0d1520 0%, #06080f 60%),
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.12), transparent),
    radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.09), transparent),
    radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.11), transparent),
    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.07), transparent),
    radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,0.08), transparent),
    radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.06), transparent);
  color: var(--text);
  font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'KaiTi', serif;
  min-height: 100vh;
  overflow: hidden;
}

/* Header */
.header {
  position: fixed; top:0; left:0; right:0; z-index:100;
  background: rgba(6,8,15,0.94);
  border-bottom: 1px solid rgba(196,163,90,0.18);
  padding: 12px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(12px);
}
.header h1 {
  font-size: 22px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 4px;
}
.header h1 span { color: #8a8070; font-size: 14px; letter-spacing: 2px; }
.header nav { display:flex; gap:24px; }
.header nav a {
  color: var(--text); text-decoration: none;
  font-size: 14px; letter-spacing: 2px;
  transition: color 0.3s;
  font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
}
.header nav a:hover { color: var(--gold); }

/* Main SVG container */
.graph-container {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
svg {
  width: 100%;
  height: 100%;
  max-width: 1400px;
  max-height: 1000px;
}

/* Edge lines */
.edge-line {
  stroke: rgba(196,163,90,0.18);
  stroke-width: 1.2;
  fill: none;
  transition: stroke 0.4s, stroke-width 0.4s;
  pointer-events: none;
}
.edge-line.highlight {
  stroke: rgba(196,163,90,0.7);
  stroke-width: 2;
}

/* Node groups */
.node-group { cursor: pointer; }
.node-group .node-bg {
  transition: fill 0.3s, opacity 0.3s;
}
.node-group .node-ring {
  fill: none;
  stroke-width: 1.2;
  transition: all 0.4s;
}
.node-group:hover .node-ring {
  stroke-width: 2.5;
  filter: drop-shadow(0 0 8px currentColor);
}
.node-group:hover .node-label {
  fill: var(--star-glow);
  font-weight: 500;
}

.node-label {
  font-size: 13px;
  text-anchor: middle;
  dominant-baseline: central;
  fill: var(--text);
  transition: fill 0.3s;
  pointer-events: none;
  paint-order: stroke;
  stroke: var(--bg);
  stroke-width: 2px;
}

.node-sub {
  font-size: 9px;
  text-anchor: middle;
  dominant-baseline: central;
  fill: #6b7490;
  pointer-events: none;
  paint-order: stroke;
  stroke: var(--bg);
  stroke-width: 1.5px;
}

/* Center node */
.center-node .center-ring-outer {
  fill: none;
  stroke: rgba(196,163,90,0.3);
  stroke-width: 1;
}
.center-node .center-ring-inner {
  fill: none;
  stroke: rgba(196,163,90,0.5);
  stroke-width: 1.5;
}
.center-node .center-text {
  font-size: 22px;
  fill: var(--gold);
  text-anchor: middle;
  dominant-baseline: central;
  letter-spacing: 6px;
  paint-order: stroke;
  stroke: var(--bg);
  stroke-width: 3px;
}

/* Edge label */
.edge-label {
  font-size: 10px;
  fill: #6b7490;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  paint-order: stroke;
  stroke: var(--bg);
  stroke-width: 1.5px;
  opacity: 0.7;
  transition: opacity 0.3s;
}
.highlight-group .edge-label { opacity: 1; fill: var(--gold); }

/* Info panel */
.info-panel {
  position: fixed;
  right: 24px;
  top: 100px;
  width: 280px;
  background: rgba(13,17,23,0.94);
  border: 1px solid rgba(196,163,90,0.2);
  border-radius: 10px;
  padding: 20px;
  z-index: 90;
  backdrop-filter: blur(12px);
  opacity: 0;
  transform: translateX(20px);
  transition: all 0.4s;
  pointer-events: none;
}
.info-panel.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}
.info-panel h3 {
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 4px;
  font-weight: 400;
  letter-spacing: 2px;
}
.info-panel .info-type {
  font-size: 11px;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.info-panel .info-desc {
  font-size: 13px;
  color: #8a8070;
  line-height: 1.7;
}
.info-panel .info-close {
  position: absolute;
  top: 8px; right: 12px;
  background: none; border: none;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  transition: color 0.3s;
}
.info-panel .info-close:hover { color: var(--gold); }

/* Legend */
.legend {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  z-index: 90;
  background: rgba(6,8,15,0.88);
  padding: 10px 20px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #8a8070;
  letter-spacing: 1px;
  font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  box-shadow: 0 0 6px currentColor;
}

/* Tooltip highlight arcs */
.highlight-arc {
  fill: none;
  stroke: rgba(196,163,90,0.25);
  stroke-width: 1;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}

/* Pulse animation on center */
@keyframes centerPulse {
  0%,100% { r: 40; opacity: 0.3; }
  50% { r: 52; opacity: 0.05; }
}
.center-pulse {
  fill: none;
  stroke: rgba(196,163,90,0.5);
  stroke-width: 0.8;
  animation: centerPulse 4s ease-in-out infinite;
}

/* Mobile */
@media (max-width: 768px) {
  .header { padding: 10px 16px; }
  .header h1 { font-size: 16px; letter-spacing: 2px; }
  .info-panel { right: 8px; width: 240px; }
  .legend { bottom: 12px; gap: 8px; padding: 8px 14px; }
  .legend-item { font-size: 10px; gap: 3px; }
}
</style>
</head>

function showInfo(id) {
  const info = nodeInfo[id];
  if (!info) return;
  const panel = document.getElementById('infoPanel');
  document.getElementById('infoTitle').textContent = info.title;
  document.getElementById('infoTitle').style.color = info.color;
  document.getElementById('infoType').textContent = info.type;
  document.getElementById('infoType').style.color = info.color;
  document.getElementById('infoDesc').textContent = info.desc;
  panel.classList.add('active');
}

function closeInfo() {
  document.getElementById('infoPanel').classList.remove('active');
}

// Close panel on clicking background
document.querySelector('.graph-container').addEventListener('click', function(e) {
  if (e.target === this || e.target.tagName === 'svg' || e.target.tagName === 'circle' && !e.target.closest('.node-group')) {
    // Don't close on svg/circle clicks that might be background
  }
});

// Keyboard shortcut
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeInfo();
});
