<title>苏州石刻天文图 · 古星图</title>
<style>
  :root {
    --bg: #06080f;
    --surface: #0d1117;
    --text: #c8c0a8;
    --gold: #c4a35a;
  }
  [data-theme="light"] {
    --bg: #f5f0e3;
    --surface: #fdfaf3;
    --text: #3d3226;
    --gold: #b8860b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'KaiTi', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 60px 20px 40px;
  }
  .home-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    text-decoration: none;
    color: var(--gold);
    font-size: 1.2rem;
    padding: 8px 16px;
    border: 1px solid rgba(196, 163, 90, 0.3);
    border-radius: 6px;
    background: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(8px);
    transition: all 0.25s;
  }
  .home-btn:hover {
    background: rgba(196, 163, 90, 0.15);
    border-color: var(--gold);
    text-shadow: 0 0 12px rgba(196, 163, 90, 0.5);
  }
  .stel-btn {
    position: fixed;
    top: 16px;
    left: 140px;
    z-index: 100;
    text-decoration: none;
    color: #4a9b8e;
    font-size: 1.1rem;
    padding: 8px 16px;
    border: 1px solid rgba(74, 155, 142, 0.3);
    border-radius: 6px;
    background: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(8px);
    transition: all 0.25s;
  }
  .stel-btn:hover {
    background: rgba(74, 155, 142, 0.15);
    border-color: #4a9b8e;
    text-shadow: 0 0 12px rgba(74, 155, 142, 0.5);
  }
  .title-area {
    text-align: center;
    margin-bottom: 24px;
  }
  .title-area h1 {
    font-size: 1.8rem;
    color: var(--gold);
    letter-spacing: 6px;
    font-weight: 400;
  }
  .title-area .subtitle {
    font-size: 0.85rem;
    color: #6a6050;
    margin-top: 6px;
    letter-spacing: 2px;
  }
  .image-container {
    max-width: 1000px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(100,130,160,0.08);
  }
  .image-container img {
    display: block;
    width: 100%;
    height: auto;
  }
  .caption {
    text-align: center;
    margin-top: 16px;
    font-size: 0.8rem;
    color: #6a6050;
    letter-spacing: 1px;
  }
  .caption a {
    color: var(--gold);
    text-decoration: none;
  }

<script src="../js/anti-copy.js?v=5"></script>
