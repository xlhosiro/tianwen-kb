<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星图 · 天问知识库</title>
<style>
  :root {
    --bg: #06080f;
    --gold: #c4a35a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    overflow: hidden;
    height: 100vh; width: 100vw;
  }
  #stel-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .home-btn {
    position: fixed; top: 48px; right: 12px; z-index: 20;
    text-decoration: none; color: rgba(200,192,168,0.7);
    font-size: 0.85rem; font-family: 'Noto Serif SC', serif;
    padding: 5px 12px; border: 1px solid rgba(200,192,168,0.15);
    border-radius: 14px; background: rgba(6,8,15,0.6);
    backdrop-filter: blur(6px); transition: all 0.25s; letter-spacing: 1px;
  }
  .home-btn:hover { background: rgba(196,163,90,0.12); border-color: rgba(196,163,90,0.35); color: #c4a35a; }
</style>
</head>
<body>

<canvas id="stel-canvas"></canvas>
<a href="../index.html" class="home-btn">← 返回首页</a>

<script src="stellarium/stellarium-web-engine.js"></script>
<script>
(function(){
  var canvas = document.getElementById('stel-canvas');

  if (typeof StelWebEngine === 'undefined') {
    document.body.innerHTML = '<div style="color:#c4a35a;text-align:center;padding-top:40vh;font-family:serif">引擎加载失败 — 请刷新重试</div>';
    return;
  }

  StelWebEngine({
    wasmFile: 'stellarium/stellarium-web-engine.wasm',
    canvasElement: canvas,
    onReady: function(stel) {
      console.log('Stellarium ready');

      // Print available modules for debugging
      console.log('core keys:', stel.core ? Object.keys(stel.core) : 'no core');
      console.log('observer:', stel.observer);
      console.log('Has render:', typeof stel.core.render);

      // Start render loop
      function loop(ts) {
        if (stel.core && stel.core.render) {
          stel.core.render(ts / 1000);
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      // Try to enable features
      if (stel.core.constellations) {
        stel.core.constellations.lines_visible = true;
        console.log('constellation lines on');
      }
      if (stel.core.atmosphere) {
        stel.core.atmosphere.visible = false;
        console.log('atmosphere off');
      }

      console.log('Engine initialized successfully');
    }
  });
})();
</script>

</body>
</html>
