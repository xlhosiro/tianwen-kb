<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星图（中国星空）· 天问知识库</title>
<style>
  :root { --bg: #06080f; --gold: #c4a35a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); overflow: hidden; height: 100vh; width: 100vw; }
  #stel-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  .home-btn {
    position: fixed; top: 48px; right: 12px; z-index: 20;
    text-decoration: none; color: rgba(200,192,168,0.7);
    font-size: 0.85rem; font-family: 'Noto Serif SC', serif;
    padding: 5px 12px; border: 1px solid rgba(200,192,168,0.15);
    border-radius: 14px; background: rgba(6,8,15,0.6);
    backdrop-filter: blur(6px); transition: all 0.25s; letter-spacing: 1px;
  }
  .home-btn:hover { background: rgba(196,163,90,0.12); border-color: rgba(196,163,90,0.35); color: #c4a35a; }
</style>
</head>
<body>

<canvas id="stel-canvas"></canvas>
<a href="../index.html" class="home-btn">← 返回首页</a>

<script src="stellarium/stellarium-web-engine.js"></script>
<script>
(function(){
  var canvas = document.getElementById('stel-canvas');

  if (typeof StelWebEngine === 'undefined') {
    document.body.innerHTML = '<div style="color:#c4a35a;text-align:center;padding-top:40vh;font-family:serif">引擎未构建</div>';
    return;
  }

  StelWebEngine({
    wasmFile: 'stellarium/stellarium-web-engine.wasm',
    canvasElement: canvas,
    locateFile: function(path, prefix) {
      // Route data and skyculture files to stellarium/ subdir
      if (path.startsWith('data/') || path.startsWith('skycultures/')) {
        return 'stellarium/' + path;
      }
      // Default: let engine handle WASM and internal files
      return prefix + path;
    },
    onReady: function(stel) {
      console.log('Stellarium ready');

      function loop(ts) {
        if (stel.core && stel.core.render) stel.core.render(ts / 1000);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      if (stel.core && stel.core.constellations) stel.core.constellations.lines_visible = true;
      if (stel.core && stel.core.atmosphere) stel.core.atmosphere.visible = false;

      console.log('Engine initialized');
    }
  });
})();
</script>

</body>
</html>
