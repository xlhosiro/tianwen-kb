<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 — 星庐·中国古天文学知识库</title>
    <meta name="description" content="全文搜索二十部天文古籍，跨越西汉至清代的天象记录。支持拼音搜索、模糊匹配、搜索建议。">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-page-title {
            text-align: center;
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
            letter-spacing: 0.06em;
        }
        .search-page-subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        /* --- Scope Filter --- */
        .search-scope {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-scope button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }
        .search-scope button:hover {
            border-color: var(--accent-gold);
            color: var(--text-body);
        }
        .search-scope button.active {
            background: rgba(201,169,110,0.15);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* --- Search Input with Autocomplete --- */
        .search-input-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .search-input-wrap input {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-body);
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input-wrap input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
        }
        .search-input-wrap input::placeholder {
            color: var(--text-dim);
        }

        /* Suggestions dropdown */
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .suggestions-dropdown.show {
            display: block;
        }
        .suggestions-dropdown .sug-item {
            padding: 9px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-body);
            border-bottom: 1px solid rgba(42,48,69,0.5);
            transition: background 0.15s;
        }
        .suggestions-dropdown .sug-item:last-child {
            border-bottom: none;
        }
        .suggestions-dropdown .sug-item:hover,
        .suggestions-dropdown .sug-item.active {
            background: var(--bg-hover);
            color: var(--accent-gold);
        }
        .suggestions-dropdown .sug-item .sug-pinyin {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-left: 8px;
        }

        /* --- Search Info Bar --- */
        .search-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .search-info .hit-count { color: var(--accent-gold); }
        .search-info .search-time { font-size: 0.8rem; opacity: 0.7; }

        /* --- Results --- */
        .result-link {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .result-link:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 4px 20px rgba(201,169,110,0.08);
        }
        .result-link .result-title {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            color: var(--accent-gold);
            margin-bottom: 4px;
        }
        .result-link .result-dynasty {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--accent-warm);
            background: rgba(212,165,116,0.1);
            border: 1px solid rgba(212,165,116,0.2);
            padding: 2px 10px;
            border-radius: 14px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .result-link .result-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .result-link .result-snippet {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.7;
        }
        .result-link .result-snippet mark {
            background: rgba(201,169,110,0.25);
            color: var(--accent-gold);
            padding: 0 2px;
            border-radius: 2px;
        }
        .result-link .result-heading {
            font-size: 0.78rem;
            color: var(--accent-jade);
            margin-bottom: 4px;
        }

        /* --- Loading --- */
        .search-loading {
            text-align: center;
            padding: 48px 0;
            color: var(--text-dim);
        }
        .search-loading .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Empty / Error --- */
        .search-empty, .search-error {
            text-align: center;
            padding: 64px 0;
            color: var(--text-dim);
        }
        .search-empty .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
        .search-error p { color: #d4756e; }

        @media (max-width: 768px) {
            .search-page-title { font-size: 1.5rem; }
            .search-scope button { padding: 5px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<nav class="top-nav" aria-label="主导航">

            <a href="index.html">首页</a>

            <a href="kg/starmap.html">古星图</a>
            <a href="kg/network.html">知识图谱</a>

            <span class="nav-theme" style="color:var(--text-muted);margin-left:2px">
                <a id="theme-day" href="javascript:_switchTheme('light')" style="color:var(--text-muted);text-decoration:none" title="日间模式">昼</a>/<a id="theme-night" href="javascript:_switchTheme('dark')" style="color:var(--accent-gold);text-decoration:none;font-weight:700" title="夜间模式">夜</a>
            </span>
        </div>
    </div>
</nav>

<div class="search-container">
    <h1 class="search-page-title">全文搜索</h1>
    <p class="search-page-subtitle">搜索二十部天文古籍正文 — 支持拼音、模糊匹配、搜索建议</p>

    <!-- Scope Filter -->
    <div class="search-scope" id="scope-bar">
        <button data-scope="all" class="active">全部</button>
        <button data-scope="title">标题</button>
        <button data-scope="body">正文</button>
        <button data-scope="star">星官名</button>
    </div>

    <!-- Search Input -->
    <div class="search-input-wrap">
        <input type="text" id="search-input" placeholder="输入关键词，如太白、青龙、xinxiu等" aria-label="搜索天文知识" autocomplete="off" autofocus>
        <div class="suggestions-dropdown" id="suggestions"></div>
    </div>

    <!-- Search Info -->
    <div class="search-info" id="search-info" style="display:none">
        <span>找到 <span class="hit-count" id="hit-count">0</span> 条结果</span>
        <span class="search-time" id="search-time"></span>
    </div>

    <!-- Results -->
    <div id="results-area">
        <div class="search-loading" id="search-loading">
            <div class="spinner"></div>
            <p>正在加载搜索索引…</p>
        </div>
    </div>
</div>

<footer role="contentinfo">
    <p>星庐·中国古天文学知识库 &copy; 2026 · 汇历代天文志，承千古观星学</p>
</footer>

<script src="js/minisearch.js"></script>
<script src="data/search-index.js?v=5"></script>
<script src="js/theme.js"></script>
<script>
(function() {
    'use strict';

    // --- DOM refs ---
    var si = document.getElementById('search-input');
    var ra = document.getElementById('results-area');
    var sinfo = document.getElementById('search-info');
    var hc = document.getElementById('hit-count');
    var st = document.getElementById('search-time');
    var sug = document.getElementById('suggestions');
    var loading = document.getElementById('search-loading');
    var scopeBar = document.getElementById('scope-bar');

    // --- State ---
    var miniSearch = null;
    var allDocs = [];
    var allSuggestions = [];
    var currentScope = 'all';
    var sugIndex = -1;
    var searchTimeout = null;

    // --- Scope filter buttons ---
    scopeBar.addEventListener('click', function(e) {
        var btn = e.target.closest('button');
        if (!btn) return;
        currentScope = btn.getAttribute('data-scope');
        scopeBar.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        if (si.value.trim()) doSearch(si.value.trim());
    });

    // --- Init: build search engine from preloaded data ---
    function initSearch(data) {
        allDocs = data.documents;
        allSuggestions = data.suggestions;

        miniSearch = new MiniSearch({
            fields: ['text', 'pinyin', 'book', 'chapter', 'dynasty'],
            storeFields: ['book', 'chapter', 'dynasty', 'url', 'type', 'text', 'heading'],
            searchOptions: {
                prefix: true,
                fuzzy: 0.2,
                boost: { book: 4, chapter: 3, text: 1, pinyin: 3 }
            }
        });
        miniSearch.addAll(allDocs);

        loading.style.display = 'none';
        ra.innerHTML = '<div class="search-empty"><div class="empty-icon">&#9737;</div><p>在上方输入关键词开始搜索</p><p style="margin-top:8px;font-size:0.85rem;color:var(--text-dim)">支持拼音搜索与模糊搜索</p></div>';

        var q = getQueryParam('q');
        if (q) { si.value = q; doSearch(q); }
    }

    if (window.SEARCH_INDEX) {
        initSearch(window.SEARCH_INDEX);
    } else {
        loading.innerHTML = '<p style="color:#d4756e">搜索索引加载失败，请刷新页面重试。</p>';
    }

    // --- Input events ---
    si.addEventListener('input', function() {
        var val = si.value.trim();
        // Update suggestions
        updateSuggestions(val);
        // Debounced search
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(function() {
            if (val) doSearch(val);
            else clearResults();
        }, 250);
    });

    si.addEventListener('keydown', function(e) {
        var items = sug.querySelectorAll('.sug-item');
        if (!sug.classList.contains('show') || items.length === 0) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (si.value.trim()) doSearch(si.value.trim());
            }
            return;
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            sugIndex = Math.min(sugIndex + 1, items.length - 1);
            updateSugActive(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            sugIndex = Math.max(sugIndex - 1, -1);
            updateSugActive(items);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (sugIndex >= 0 && items[sugIndex]) {
                si.value = items[sugIndex].getAttribute('data-text');
                sug.classList.remove('show');
                sugIndex = -1;
                doSearch(si.value);
            } else {
                sug.classList.remove('show');
                sugIndex = -1;
                if (si.value.trim()) doSearch(si.value.trim());
            }
        } else if (e.key === 'Escape') {
            sug.classList.remove('show');
            sugIndex = -1;
        }
    });

    // Click outside suggestions
    document.addEventListener('click', function(e) {
        if (!sug.contains(e.target) && e.target !== si) {
            sug.classList.remove('show');
            sugIndex = -1;
        }
    });

    // --- Suggestions ---
    sug.addEventListener('click', function(e) {
        var item = e.target.closest('.sug-item');
        if (!item) return;
        si.value = item.getAttribute('data-text');
        sug.classList.remove('show');
        sugIndex = -1;
        doSearch(si.value);
    });

    function updateSugActive(items) {
        items.forEach(function(item, i) {
            item.classList.toggle('active', i === sugIndex);
        });
    }

    function updateSuggestions(query) {
        sugIndex = -1;
        if (!query || query.length < 1) {
            sug.classList.remove('show');
            return;
        }

        var qLower = query.toLowerCase();
        var matches = [];

        // Match suggestions by text prefix or pinyin prefix
        for (var i = 0; i < allSuggestions.length; i++) {
            var s = allSuggestions[i];
            if (matches.length >= 8) break;
            if (s.text.indexOf(query) === 0 || s.pinyin.indexOf(qLower) === 0) {
                matches.push(s);
            }
        }

        // If not enough, try contains match
        if (matches.length < 5) {
            for (var j = 0; j < allSuggestions.length; j++) {
                var s = allSuggestions[j];
                if (matches.length >= 8) break;
                var already = false;
                for (var k = 0; k < matches.length; k++) {
                    if (matches[k].text === s.text) { already = true; break; }
                }
                if (already) continue;
                if (s.text.indexOf(query) !== -1 || s.pinyin.indexOf(qLower) !== -1) {
                    matches.push(s);
                }
            }
        }

        if (matches.length === 0) {
            sug.classList.remove('show');
            return;
        }

        var html = '';
        for (var m = 0; m < matches.length; m++) {
            var s = matches[m];
            html += '<div class="sug-item" data-text="' + escAttr(s.text) + '">'
                 + escHtml(s.text)
                 + '<span class="sug-pinyin">' + escHtml(s.pinyin) + '</span>'
                 + '</div>';
        }
        sug.innerHTML = html;
        sug.classList.add('show');
    }

    // --- Search ---
    function doSearch(query) {
        if (!miniSearch) return;
        sugIndex = -1;

        var t0 = performance.now();

        // If query looks like pinyin without spaces, try to split into syllables
        var isPinyin = /^[a-zA-Z\s]+$/.test(query);
        var pinyinTokens = query;
        if (isPinyin && query.indexOf(' ') === -1) {
            // Insert spaces between pinyin syllables (before consonants)
            pinyinTokens = query.replace(/([aeiouv])([bpmfdtnlgkhjqxzcsryw])/gi, '$1 $2');
        }

        // MiniSearch query
        var results;
        var searchTerms = isPinyin ? pinyinTokens : query;
        try {
            results = miniSearch.search(searchTerms, {
                prefix: true,
                fuzzy: function(term) { return term.length <= 3 ? 0.5 : 0.2; },
                combineWith: 'AND',
                boost: { book: 4, chapter: 3, text: 1, pinyin: 3 }
            });
        } catch(e) {
            results = [];
        }

        // Fallback: also search with OR if AND yields too few results
        if (results.length < 3 && isPinyin) {
            try {
                var orResults = miniSearch.search(searchTerms, {
                    prefix: true,
                    fuzzy: function(term) { return term.length <= 3 ? 0.5 : 0.2; },
                    combineWith: 'OR',
                    fields: ['pinyin', 'text'],
                    boost: { pinyin: 3, text: 1 }
                });
                // Merge, dedupe
                var seen = {};
                var merged = [];
                results.forEach(function(r) { seen[r.id] = true; merged.push(r); });
                orResults.forEach(function(r) {
                    if (!seen[r.id]) { seen[r.id] = true; merged.push(r); }
                });
                results = merged;
                results.sort(function(a, b) { return b.score - a.score; });
            } catch(e) {}
        }

        // Filter by scope
        if (currentScope !== 'all') {
            results = results.filter(function(r) {
                return r.type === currentScope || 
                       (currentScope === 'star' && (r.text.indexOf('星官') !== -1 || r.type === 'star'));
            });
        }

        var elapsed = (performance.now() - t0).toFixed(0);

        // Render
        sinfo.style.display = 'flex';
        hc.textContent = results.length;
        st.textContent = elapsed + ' ms';

        if (results.length === 0) {
            ra.innerHTML = '<div class="search-empty"><div class="empty-icon">&#9789;</div><p>未找到匹配「<strong>' + escHtml(query) + '</strong>」的结果</p><p style="margin-top:8px;font-size:0.85rem;color:var(--text-dim)">试试拼音？输入 yinghuo 代替「荧惑」<br>试试模糊搜索？输入「荧或」也能匹配</p></div>';
            return;
        }

        // Limit results
        var maxResults = 50;
        var shown = results.slice(0, maxResults);

        var terms = query.split(/\s+/).filter(function(t) { return t.length > 0; });

        var html = '';
        shown.forEach(function(r) {
            var text = r.text || '';
            var snippet = makeSnippet(text, terms, 120);
            var url = r.url || '#';
            // Build paragraph anchor if body type
            // href → chapters/01_xxx.html#para-0001 (matches id="para-0001" in chapter pages)
            if (r.type === 'body' && r.id) {
                var parts = r.id.split('_');
                if (parts.length >= 2) {
                    var paraNum = parts[1].replace(/^p/, '');
                    var baseUrl = r.url.split('#')[0];
                    url = baseUrl + '#para-' + paraNum;
                }
            }

            html += '<a href="' + escAttr(url) + '" class="result-link">'
                 + '<div class="result-title">' + escHtml(r.book) + ' · ' + escHtml(r.chapter)
                 + '<span class="result-dynasty">' + escHtml(r.dynasty) + '</span></div>';
            if (r.heading) {
                html += '<div class="result-heading">' + escHtml(r.heading) + '</div>';
            }
            html += '<div class="result-meta">' + (r.author ? escHtml(r.author) + ' · ' : '') + (r.type === 'title' ? '书目信息' : '正文段落') + '</div>';
            if (snippet) {
                html += '<p class="result-snippet">' + snippet + '</p>';
            }
            html += '</a>';
        });

        ra.innerHTML = html;
    }

    function clearResults() {
        sinfo.style.display = 'none';
        if (miniSearch) {
            ra.innerHTML = '<div class="search-empty"><div class="empty-icon">&#9737;</div><p>在上方输入关键词开始搜索</p><p style="margin-top:8px;font-size:0.85rem;color:var(--text-dim)">支持拼音、模糊搜索、搜索建议</p></div>';
        }
    }

    // --- Snippet generation ---
    function makeSnippet(text, terms, contextLen) {
        if (!text || terms.length === 0) return escHtml(text.substring(0, contextLen * 2)) + '…';

        // Find match positions
        var lower = text.toLowerCase();
        var positions = [];
        terms.forEach(function(term) {
            var tLower = term.toLowerCase();
            var pos = 0;
            while (pos < lower.length) {
                var idx = lower.indexOf(tLower, pos);
                if (idx === -1) break;
                positions.push(idx);
                pos = idx + 1;
            }
        });

        if (positions.length === 0) {
            return escHtml(text.substring(0, contextLen)) + '…';
        }

        // Sort positions and pick best window
        positions.sort(function(a, b) { return a - b; });

        // Take first match window
        var center = positions[0] + Math.floor(terms[0].length / 2);
        var start = Math.max(0, center - contextLen);
        var end = Math.min(text.length, center + contextLen);

        // Adjust to word boundary
        while (start > 0 && !isCJKBreak(text[start])) start--;
        while (end < text.length && !isCJKBreak(text[end])) end++;

        var prefix = start > 0 ? '…' : '';
        var suffix = end < text.length ? '…' : '';

        var excerpt = text.substring(start, end);

        // Highlight all terms
        var highlighted = escHtml(excerpt);
        terms.forEach(function(term) {
            var escaped = escHtml(term);
            var regex = new RegExp('(' + escapeRegex(escaped) + ')', 'gi');
            highlighted = highlighted.replace(regex, '<mark>$1</mark>');
        });

        return prefix + highlighted + suffix;
    }

    function isCJKBreak(ch) {
        // Break at Chinese punctuation or whitespace-like chars
        return /[\u3000-\u303F\uFF00-\uFFEF\s，。；：！？、]/.test(ch);
    }

    // --- Helpers ---
    function escHtml(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    function escAttr(s) {
        return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeRegex(s) {
        return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function getQueryParam(name) {
        var m = window.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
        return m ? decodeURIComponent(m[1]) : '';
    }

})();
</script>
</body>
