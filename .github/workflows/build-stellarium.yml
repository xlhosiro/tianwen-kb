name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:3.1.45
    steps:
      - name: Checkout tianwen-kb
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3-pip git
          pip3 install scons

      - name: Clone Stellarium Web Engine
        run: |
          git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/stellarium

      - name: Debug environment
        run: |
          echo "=== EMSDK ==="
          echo "EMSDK=${EMSDK:-NOT SET}"
          echo "EMSCRIPTEN_TOOL_PATH=${EMSCRIPTEN_TOOL_PATH:-NOT SET}"
          echo "=== Tools ==="
          which emscons || echo "emscons not in PATH"
          which emcc || echo "emcc not in PATH"
          which scons || echo "scons not in PATH"

      - name: Build Stellarium Web Engine
        working-directory: /tmp/stellarium
        run: |
          set -e
          echo "Build started at $(date)"

          # If emscons not available, source env and run scons directly
          if command -v emscons &>/dev/null; then
            echo "Using emscons..."
            make js 2>&1 | tee /tmp/build.log
          else
            echo "emscons not found, running scons with emscripten tool directly..."
            # The emscripten/emsdk container should have EMSCRIPTEN_TOOL_PATH set
            if [ -z "$EMSCRIPTEN_TOOL_PATH" ] && [ -n "$EMSDK" ]; then
              export EMSCRIPTEN_TOOL_PATH="$EMSDK/upstream/emscripten/tools"
            fi
            echo "EMSCRIPTEN_TOOL_PATH=$EMSCRIPTEN_TOOL_PATH"
            scons -j$(nproc) mode=release 2>&1 | tee /tmp/build.log
          fi

          echo "Build finished at $(date)"

      - name: Verify build output
        run: |
          echo "=== Build artifacts ==="
          ls -lh /tmp/stellarium/build/stellarium-web-engine.* 2>/dev/null || {
            echo "BUILD OUTPUT NOT FOUND!"
            echo "=== Build log (last 80 lines) ==="
            tail -80 /tmp/build.log 2>/dev/null || echo "No log found"
            exit 1
          }

      - name: Copy artifacts to repo
        run: |
          mkdir -p docs/kg/stellarium
          cp /tmp/stellarium/build/stellarium-web-engine.js docs/kg/stellarium/
          cp /tmp/stellarium/build/stellarium-web-engine.wasm docs/kg/stellarium/
          echo "=== Copied ==="
          ls -lh docs/kg/stellarium/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/kg/stellarium/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Stellarium Web Engine build artifacts"
            git push
            echo "=== Pushed ==="
          fi
