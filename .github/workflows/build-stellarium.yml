name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.34
          actions-cache-folder: 'emsdk-cache'

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/s

      - name: Patch & build assets
        working-directory: /tmp/s
        run: |
          # Remove -Werror block (2 lines: if + append)
          sed -i "/if env\['werror'\]:/,+1d" SConstruct
          # Remove the root-dir check block from make-assets.py (3 lines: if + print + exit)
          sed -i '/if os.path.dirname/,+2d' tools/make-assets.py
          # Generate embedded assets (star catalog, textures, fonts)
          python3 tools/make-assets.py
          echo "=== Assets generated ==="
          ls src/assets/ 2>/dev/null | head -10

      - name: Build
        working-directory: /tmp/s
        run: |
          set -e
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"
          echo "Build start: $(date)"
          emscons scons -j4 mode=release 2>&1 | tee /tmp/build.log
          echo "Build done: $(date)"

      - name: Verify & Push
        run: |
          ls -lh /tmp/s/build/stellarium-web-engine.*
          if [ -f /tmp/s/build/stellarium-web-engine.js ]; then
            mkdir -p docs/kg/stellarium
            cp /tmp/s/build/stellarium-web-engine.js docs/kg/stellarium/
            cp /tmp/s/build/stellarium-web-engine.wasm docs/kg/stellarium/
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/kg/stellarium/
            git diff --cached --quiet || (git commit -m "chore: Stellarium Web Engine artifacts" && git push)
          else
            tail -80 /tmp/build.log
            exit 1
          fi
