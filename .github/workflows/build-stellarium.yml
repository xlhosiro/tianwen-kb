name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.34
          actions-cache-folder: 'emsdk-cache'

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/s

      - name: Clone sky cultures
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-skycultures.git /tmp/skycultures

      - name: Patch & build
        working-directory: /tmp/s
        run: |
          sed -i "/if env\['werror'\]:/,+1d" SConstruct
          sed -i '/if os.path.dirname/,+2d' tools/make-assets.py
          python3 tools/make-assets.py
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"
          emscons scons -c mode=release 2>/dev/null || true
          emscons scons -j2 mode=release 2>&1 | tee /tmp/build.log

      - name: Deploy
        run: |
          D=docs/kg/stellarium
          mkdir -p "$D"

          # Core engine
          cp /tmp/s/build/stellarium-web-engine.js "$D/"
          cp /tmp/s/build/stellarium-web-engine.wasm "$D/"

          # Star data directory (entire /tmp/s/data)
          if [ -d /tmp/s/data ]; then
            rm -rf "$D/data"
            cp -a /tmp/s/data "$D/data"
            echo "data: $(du -sh /tmp/s/data | cut -f1)"
          fi

          # Chinese sky culture
          if [ -d /tmp/skycultures/chinese ]; then
            mkdir -p "$D/skycultures"
            cp -a /tmp/skycultures/chinese "$D/skycultures/"
            echo "skyculture: chinese OK"
          fi

          echo "=== Final ==="
          find "$D" -type f | head -30
          du -sh "$D"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/kg/stellarium/
          if ! git diff --cached --quiet; then
            git commit -m "chore: Stellarium Engine + data + Chinese skyculture" && git push
          fi
