name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tianwen-kb
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip git

      - name: Setup Emscripten SDK
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install 3.1.45
          ./emsdk activate 3.1.45
          echo "EMSDK=/tmp/emsdk" >> $GITHUB_ENV
          echo "/tmp/emsdk" >> $GITHUB_PATH
          echo "/tmp/emsdk/upstream/emscripten" >> $GITHUB_PATH

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium Web Engine
        run: |
          git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/stellarium

      - name: Build Stellarium Web Engine
        working-directory: /tmp/stellarium
        run: |
          set -e
          source /tmp/emsdk/emsdk_env.sh
          echo "EMSCRIPTEN_TOOL_PATH=$EMSCRIPTEN_TOOL_PATH"
          echo "Build started at $(date)"
          make js 2>&1 | tee /tmp/build.log
          echo "Build finished at $(date)"

      - name: Verify output
        run: |
          ls -lh /tmp/stellarium/build/stellarium-web-engine.* || {
            echo "=== Build failed, last 80 lines ==="
            tail -80 /tmp/build.log
            exit 1
          }

      - name: Copy to repo
        run: |
          mkdir -p docs/kg/stellarium
          cp /tmp/stellarium/build/stellarium-web-engine.js docs/kg/stellarium/
          cp /tmp/stellarium/build/stellarium-web-engine.wasm docs/kg/stellarium/
          ls -lh docs/kg/stellarium/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/kg/stellarium/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update Stellarium Web Engine artifacts"
            git push
          fi
